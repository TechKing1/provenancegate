repos:
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        always_run: true
